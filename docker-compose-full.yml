version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_password_2024
      POSTGRES_DB: qframe
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d qframe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quant-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://quant:quant_password_2024@postgres:5432/qframe
      JWT_SECRET: your_jwt_secret_change_this
      API_HOST: 0.0.0.0
      API_PORT: 5000
      CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quant-network
    volumes:
      - ./backend/data:/app/data
      - ./backend/shared:/app/shared

  # 前端（可选）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quant-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - quant-network

volumes:
  postgres_data:
    driver: local

networks:
  quant-network:
    driver: bridge

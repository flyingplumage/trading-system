version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_password_2024
      POSTGRES_DB: qframe
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - quant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d qframe"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quant-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qframe.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_2024
      TZ: Asia/Shanghai
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - quant-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  quant-network:
    driver: bridge
